<script>
document.addEventListener("DOMContentLoaded", () => {
    const launchDate = new Date(2026, 1, 8); // 8 Feb 2026 (month is zero-based)
    const siteAgeEl = document.getElementById("site-age");

    function updateSiteAge() {
        const now = new Date();

        let years = now.getFullYear() - launchDate.getFullYear();
        let months = now.getMonth() - launchDate.getMonth();
        let days = now.getDate() - launchDate.getDate();

        if (days < 0) {
            months--;
            const previousMonth = new Date(now.getFullYear(), now.getMonth(), 0);
            days += previousMonth.getDate();
        }

        if (months < 0) {
            years--;
            months += 12;
        }

        const parts = [];

        if (years > 0) {
            parts.push(`${years} ${years === 1 ? "year" : "years"}`);
        }

        if (months > 0) {
            parts.push(`${months} ${months === 1 ? "month" : "months"}`);
        }

        if (days > 0 || parts.length === 0) {
            parts.push(`${days} ${days === 1 ? "day" : "days"}`);
        }

        siteAgeEl.textContent = `Cluttering up the web for: ${parts.join(", ")}`;
    }

    updateSiteAge();
    setInterval(updateSiteAge, 60 * 60 * 1000); // update every hour
});
</script>
